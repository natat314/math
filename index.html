<!DOCTYPE html>
<html>
  <head>
    <title>math</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #111;
        font-family: Arial, sans-serif;
      }
      button {
        padding: 20px 40px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        background-color: red;
        color: white;
        cursor: pointer;
        transition: background-color 0.3s;
      }
    </style>
  </head>
  <body>
    <button id="btn" onclick="openCloakedWindow()">Click to change color</button>

    <script>
      // WHITELIST EMAILS
      const allowedEmails = [
        "jayxiong601@busd.net",
        "myldai650@busd.net",
        "jasyang015@busd.net",
        "micperez128@busd.net",
        "nattsirkel401@busd.net"
      ];

      let userEmail = null;

      function checkEmail() {
        if (!userEmail) {
          userEmail = prompt("Enter your email:");
        }
        return allowedEmails.includes(userEmail);
      }

      const colors = ["red", "blue", "green", "purple", "orange", "pink"];
      let i = 0;

      function openCloakedWindow() {
        // CHECK WHITELIST FIRST
        if (!checkEmail()) {
          alert("Access denied.");
          return;
        }

        // Change button color
        const btn = document.getElementById("btn");
        i = (i + 1) % colors.length;
        btn.style.backgroundColor = colors[i];

        // Open a new blank window
        const newWin = window.open("about:blank", "_blank", "width=1024,height=768");

        // Write an iframe inside it that loads the actual site
        newWin.document.write(`
          <html>
            <head>
              <title>Loading...</title>
              <style>
                html, body {
                  margin: 0;
                  padding: 0;
                  height: 100%;
                }
                iframe {
                  border: none;
                  width: 100%;
                  height: 100%;
                }
              </style>
            </head>
            <body>
              <iframe src="https://eaglercraft.dev/clients/Tuff%20Client%20Beta%201.1UT12%20WASM/"></iframe>
            </body>
          </html>
        `);
        newWin.document.close();
      }
    </script>
  </body>
</html>
