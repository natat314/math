<!DOCTYPE html>
<html>
  <head>
    <title>kylerunottuff</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #111;
        font-family: Arial, sans-serif;
      }
      button {
        padding: 20px 40px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        background-color: red;
        color: white;
        cursor: pointer;
        transition: background-color 0.3s;
      }
    </style>
  </head>
  <body>
    <button id="btn" onclick="openWindow()">Click to change color</button>

    <script>
      const colors = ["red", "blue", "green", "purple", "orange", "pink"];
      let i = 0;

      function openWindow() {
        // Change button color
        const btn = document.getElementById("btn");
        i = (i + 1) % colors.length;
        btn.style.backgroundColor = colors[i];

        // Open a "new window" (popup style)
        const newWin = window.open("", "_blank", "width=800,height=600");

        // Initially blank content
        newWin.document.write("<p style='font-family:Arial;text-align:center;margin-top:50px;'>Loading...</p>");

        // Immediately redirect to actual site
        newWin.location.href = "https://eaglercraft.dev/clients/Tuff%20Client%20WASM/";
      }
    </script>
  </body>
</html>
