<!DOCTYPE html>
<html>
<head>
  <title>Cloaked</title>
</head>
<body>

<button onclick="openCloaked()">Open</button>

<script>
  function openCloaked() {
    const newWin = window.open(
      "about:blank",
      "_blank",
      "width=1000,height=700,menubar=no,toolbar=no,location=no,status=no"
    );

    if (!newWin) {
      alert("Allow popups for this site.");
      return;
    }

    newWin.document.write(`
      <!DOCTYPE html>
      <html>
        <head>
          <title>Loading...</title>
          <style>
            html, body {
              margin: 0;
              padding: 0;
              height: 100%;
              background: black;
            }
            iframe {
              border: none;
              width: 100%;
              height: 100%;
            }
          </style>
        </head>
        <body>
          <iframe src="https://eaglercraft.dev/clients/Tuff%20Client%20Beta%201.1UT12%20WASM/"></iframe>
        </body>
      </html>
    `);

    newWin.document.close();
  }
</script>

</body>
</html>
