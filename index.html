<!DOCTYPE html>
<html>
<head>
  <title>The Carrot Launcher</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
      font-family: Arial;
      color: white;
    }

    .container {
      text-align: center;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: orange;
      color: white;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🥕 Carrot Launcher</h1>
  <button onclick="showModal()">Open</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <input type="password" id="passwordInput" placeholder="Password">
    <br><br>
    <button onclick="checkPassword()">Enter</button>
  </div>
</div>

<script>
window.onload = function() {

  let siteEnabled = JSON.parse(localStorage.getItem("siteEnabled"));
  if (siteEnabled === null) siteEnabled = true;

  function saveState() {
    localStorage.setItem("siteEnabled", JSON.stringify(siteEnabled));
  }

  window.showModal = function() {
    document.getElementById("modal").style.display = "flex";
  };

  // 🎮 DEV PANEL
  function openDevPanel() {
    const win = window.open("", "_blank", "width=600,height=500,left=200,top=100");

    win.document.write(`
      <style>
        body { background:black; color:#0f0; font-family:monospace; padding:10px; }
        #terminal { white-space: pre-wrap; }
        input { background:black; color:#0f0; border:none; outline:none; width:90%; }
      </style>

      <div id="terminal"></div>
      <div>> <input id="cmd"></div>
    `);

    win.document.close();

    const term = win.document.getElementById("terminal");
    const input = win.document.getElementById("cmd");

    function print(text) {
      term.innerHTML += text + "\\n";
    }

    print("CarrotOS v1.0");
    print("Type 'help'");

    input.focus();

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        const cmd = input.value.toLowerCase().trim();
        print("> " + cmd);
        handle(cmd);
        input.value = "";
      }
    });

    function handle(cmd) {
      if (cmd === "help") print("status / enable / disable / clear");
      else if (cmd === "status") print(siteEnabled ? "ENABLED" : "DISABLED");
      else if (cmd === "enable") { siteEnabled = true; saveState(); print("ENABLED"); }
      else if (cmd === "disable") { siteEnabled = false; saveState(); print("DISABLED"); }
      else if (cmd === "clear") term.innerHTML = "";
      else print("unknown command");
    }
  }

  // 🚀 POPUP WINDOW (NOT TAB)
  function openCloakedWindow() {
    const newWindow = window.open(
      "about:blank",
      "_blank",
      "width=1200,height=700,left=100,top=50,resizable=yes"
    );

    if (!newWindow) {
      alert("Popup blocked! Enable popups.");
      return;
    }

    newWindow.document.write(
      "<title>about:blank</title>" +
      "<style>html,body{margin:0;height:100%;background:black;}</style>" +
      "<iframe src='https://eaglercraft.dev/clients/Tuff%20Client%20Beta%201.1UT12%20WASM/' " +
      "style='width:100%;height:100%;border:none;'></iframe>"
    );

    newWindow.document.close();
  }

  window.checkPassword = function() {
    const input = document.getElementById("passwordInput").value
      .trim()
      .toLowerCase();

    if (["carrotdev","carrotdevtools","carrotdevtool"].includes(input)) {
      openDevPanel();
      return;
    }

    if (!siteEnabled) {
      playJumpScare();
      return;
    }

    if (input === "kylerisrooegg") {
      openCloakedWindow(); // ✅ THIS IS NOW A WINDOW
      document.getElementById("modal").style.display = "none";
      return;
    }

    playJumpScare();
  };

  function playJumpScare() {
    const scare = document.createElement("div");
    scare.innerText = "🥕";
    scare.style.position = "fixed";
    scare.style.top = "50%";
    scare.style.left = "50%";
    scare.style.transform = "translate(-50%,-50%) scale(5)";
    scare.style.fontSize = "100px";
    scare.style.zIndex = 9999;

    document.body.appendChild(scare);

    setTimeout(() => scare.remove(), 800);
  }

};
</script>

</body>
</html>
