<!DOCTYPE html>
<html>
<head>
  <title>Cloaked Window Example</title>
</head>
<body>

<button onclick="openCloakedWindow()">Open Cloaked Window</button>

<script>
  function openCloakedWindow() {
    // Open a blank window first
    const newWin = window.open("", "_blank", "width=1024,height=768");

    if (!newWin) {
      alert("Popup blocked! Please allow popups for this site.");
      return;
    }

    // Write a minimal HTML structure that will later show the website
    newWin.document.write(`
      <!DOCTYPE html>
      <html>
        <head>
          <title>Loading...</title>
          <style>
            html, body {
              margin: 0;
              padding: 0;
              height: 100%;
            }
            iframe {
              border: none;
              width: 100%;
              height: 100%;
            }
          </style>
        </head>
        <body>
          <iframe src="https://eaglercraft.dev/clients/Tuff%20Client%20Beta%201.1UT12%20WASM/"></iframe>
        </body>
      </html>
    `);

    newWin.document.close();
  }
</script>

</body>
</html>
