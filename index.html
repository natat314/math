<!DOCTYPE html>
<html>
<head>
  <title>The Carrot Launcher</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FF9F45, #FF6F31);
      font-family: Arial, sans-serif;
      color: #fff7e6;
      overflow: hidden;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      background: rgba(255, 159, 69, 0.15);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(255, 111, 49, 0.4);
      backdrop-filter: blur(10px);
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #FF6F31;
      color: #fff7e6;
      cursor: pointer;
    }

    #flash {
      position: fixed;
      width: 100vw;
      height: 100vh;
      background: #FF6F31;
      opacity: 0;
      z-index: 9999;
      pointer-events: none;
    }

    #blockedScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #111;
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 20000;
      text-align: center;
    }

    #blockedScreen h1 {
      font-size: 40px;
      margin-bottom: 10px;
      color: #ff4d4d;
    }

    #blockedScreen p {
      font-size: 18px;
      opacity: 0.8;
    }

    #carrotCursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="flash"></div>

<div id="blockedScreen">
  <h1>noob egg fail</h1>
  <p>This page is blocked.</p>
</div>

<canvas id="carrotCursor"></canvas>

<div class="container">
  <h1>The Carrot Launcher</h1>
  <button onclick="showPage()">Open</button>
</div>

<script>
  const cursorCanvas = document.getElementById('carrotCursor');
  const ctx = cursorCanvas.getContext('2d');

  function resizeCanvas() {
    cursorCanvas.width = window.innerWidth;
    cursorCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function drawCarrot() {
    ctx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
    ctx.save();

    const bounce = Math.sin(Date.now() / 150) * 5;
    ctx.translate(mouseX, mouseY - bounce);

    ctx.fillStyle = '#FF9F45';
    ctx.beginPath();
    ctx.moveTo(0, -15);
    ctx.lineTo(10, 15);
    ctx.lineTo(-10, 15);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'green';
    ctx.fillRect(-3, -25, 6, 10);

    ctx.restore();
    requestAnimationFrame(drawCarrot);
  }
  drawCarrot();

  function showPage() {
    document.getElementById("blockedScreen").style.display = "flex";
  }
</script>

</body>
</html>
