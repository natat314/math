<!DOCTYPE html>
<html>
<head>
  <title>The Carrot Launcher</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FF9F45, #FF6F31);
      font-family: Arial, sans-serif;
      color: #fff7e6;
      overflow: hidden;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      background: rgba(255, 159, 69, 0.15);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(255, 111, 49, 0.4);
      backdrop-filter: blur(10px);
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #FF6F31;
      color: #fff7e6;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }

    .modal-box {
      background: #FF9F45;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    #flash {
      position: fixed;
      width: 100vw;
      height: 100vh;
      background: #FF6F31;
      opacity: 0;
      z-index: 9999;
      pointer-events: none;
    }

    @keyframes shake {
      0% { transform: translate(0,0); }
      25% { transform: translate(-10px, 5px); }
      50% { transform: translate(10px, -5px); }
      75% { transform: translate(-5px, 10px); }
      100% { transform: translate(0,0); }
    }

    .shake { animation: shake 0.3s; }

    #carrotCursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="flash"></div>
<canvas id="carrotCursor"></canvas>

<div class="container">
  <h1>The Carrot Launcher</h1>
  <button onclick="showModal()">Open</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Password</h3>
    <input type="password" id="passwordInput">
    <br><br>
    <button onclick="checkPassword()">Continue</button>
  </div>
</div>

<script>
window.onload = function() {

  const cursorCanvas = document.getElementById('carrotCursor');
  const ctx = cursorCanvas.getContext('2d');

  function resizeCanvas() {
    cursorCanvas.width = window.innerWidth;
    cursorCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function drawCarrot() {
    ctx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
    ctx.save();

    const bounce = Math.sin(Date.now() / 150) * 5;
    ctx.translate(mouseX, mouseY - bounce);

    ctx.fillStyle = '#FF9F45';
    ctx.beginPath();
    ctx.moveTo(0, -15);
    ctx.lineTo(10, 15);
    ctx.lineTo(-10, 15);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'green';
    ctx.fillRect(-3, -25, 6, 10);

    ctx.restore();
    requestAnimationFrame(drawCarrot);
  }
  drawCarrot();

  window.showModal = function() {
    document.getElementById("modal").style.display = "flex";
  }

  function getTodayPassword() {
    return "kylerwillneverfindthepassword";
  }

  window.checkPassword = function() {
    const input = document.getElementById("passwordInput").value
      .trim()
      .toLowerCase();

    const correct = getTodayPassword();

    if (input !== correct) {
      playJumpScare();
      return;
    }

    // ✅ OPEN POPUP WINDOW
    const newWindow = window.open(
      "about:blank",
      "_blank",
      "width=1200,height=700,left=100,top=100,resizable=yes"
    );

    if (!newWindow) {
      alert("Popup blocked! Enable popups.");
      return;
    }

    newWindow.document.write(`
      <title>Classes</title>
      <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
      <style>
        html, body {
          margin: 0;
          height: 100%;
          overflow: hidden;
          background: black;
        }
      </style>
      <iframe src="https://eaglercraft.dev/clients/Tuff%20Client%20Beta%201.1UT12%20WASM/"
        frameborder="0"
        style="width:100%;height:100%">
      </iframe>
    `);

    newWindow.document.close();

    document.getElementById("modal").style.display = "none";
  }

  function playJumpScare() {
    const scare = document.createElement('img');
    scare.src = 'https://upload.wikimedia.org/wikipedia/commons/7/7e/Carrot.png';

    scare.style.position = 'fixed';
    scare.style.top = '50%';
    scare.style.left = '50%';
    scare.style.transform = 'translate(-50%, -50%) scale(0.1)';
    scare.style.width = '250px';
    scare.style.zIndex = 10000;
    scare.style.transition = 'transform 0.15s ease-out';
    document.body.appendChild(scare);

    setTimeout(() => {
      scare.style.transform = 'translate(-50%, -50%) scale(1.5)';
    }, 10);

    new Audio('https://www.myinstants.com/media/sounds/get-out-sound-effect.mp3').play();

    const flash = document.getElementById('flash');
    flash.style.opacity = '0.8';
    setTimeout(() => flash.style.opacity = '0', 150);

    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 300);

    if (document.body.requestPointerLock) {
      document.body.requestPointerLock();
    }

    setTimeout(() => {
      scare.remove();
    }, 1200);
  }

};
</script>

</body>
</html>
