<!DOCTYPE html>
<html>
<head>
  <title>The Carrot Launcher</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
      font-family: Arial;
      color: white;
    }

    .container {
      text-align: center;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: orange;
      color: white;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    label {
      font-size: 12px;
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🥕 Carrot LauncherV2.0</h1>
  <button onclick="showModal()">Open</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <input type="password" id="passwordInput" placeholder="Password">
    <br>
    <label>
      <input type="checkbox" id="rememberPass"> Remember password
    </label>
    <br>
    <button onclick="checkPassword()">Enter</button>
  </div>
</div>

<script>
window.onload = function() {

  let siteEnabled = JSON.parse(localStorage.getItem("siteEnabled"));
  if (siteEnabled === null) siteEnabled = true;

  // 🔐 LOAD SAVED PASSWORD
  const savedPass = localStorage.getItem("savedPassword");
  if (savedPass) {
    document.getElementById("passwordInput").value = savedPass;
    document.getElementById("rememberPass").checked = true;

    // OPTIONAL AUTO LOGIN
    setTimeout(() => {
      checkPassword();
    }, 300);
  }

  function saveState() {
    localStorage.setItem("siteEnabled", JSON.stringify(siteEnabled));
  }

  window.showModal = function() {
    document.getElementById("modal").style.display = "flex";
  };

  // 🎮 DEV PANEL (unchanged)
  function openDevPanel() {
    const win = window.open("", "_blank", "width=600,height=500,left=200,top=100");

    win.document.write(`
      <style>
        body { background:black; color:#0f0; font-family:monospace; padding:10px; }
        #terminal { white-space: pre-wrap; height:90%; overflow-y:auto; }
        input { background:black; color:#0f0; border:none; outline:none; width:90%; }
      </style>

      <div id="terminal"></div>
      <div>> <input id="cmd" autofocus></div>
    `);

    win.document.close();

    const term = win.document.getElementById("terminal");
    const input = win.document.getElementById("cmd");

    function typeText(text, speed = 15, callback) {
      let i = 0;
      function typing() {
        if (i < text.length) {
          term.innerHTML += text.charAt(i);
          i++;
          term.scrollTop = term.scrollHeight;
          setTimeout(typing, speed);
        } else {
          term.innerHTML += "\\n";
          if (callback) callback();
        }
      }
      typing();
    }

    function fakeLogs(callback) {
      const logs = [
        "Initializing modules...",
        "Connecting to core system...",
        "Bypassing security...",
        "Accessing code...",
        "Injecting commands...",
        "Finalizing..."
      ];

      let i = 0;
      function next() {
        if (i < logs.length) {
          typeText(logs[i], 10, () => {
            i++;
            next();
          });
        } else callback();
      }
      next();
    }

    function bootLogs() {
      typeText("CarrotOS v2.0", 20, () => {
        typeText("Loading system...", 15, () => {
          typeText("Ready.");
        });
      });
    }

    bootLogs();

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        const cmd = input.value.toLowerCase().trim();
        typeText("> " + cmd, 5);
        handle(cmd);
        input.value = "";
      }
    });

    function handle(cmd) {
      if (cmd === "help") typeText("Commands: status / enable / disable / clear");
      else if (cmd === "status") typeText(siteEnabled ? "🟢 ENABLED" : "🔴 DISABLED");
      else if (cmd === "enable") {
        typeText("Enabling system...", 15, () => {
          fakeLogs(() => {
            siteEnabled = true;
            saveState();
            typeText("✔ SYSTEM ENABLED");
          });
        });
      }
      else if (cmd === "disable") {
        typeText("Disabling system...", 15, () => {
          fakeLogs(() => {
            siteEnabled = false;
            saveState();
            typeText("✖ SYSTEM DISABLED");
          });
        });
      }
      else if (cmd === "clear") {
        term.innerHTML = "";
        bootLogs();
      }
      else typeText("Unknown command");
    }
  }

  function openCloakedWindow() {
    const newWindow = window.open(
      "about:blank",
      "_blank",
      "width=1200,height=700,left=100,top=50,resizable=yes"
    );

    if (!newWindow) {
      alert("Popup blocked!");
      return;
    }

    newWindow.document.write(
      "<title>about:blank</title>" +
      "<style>html,body{margin:0;height:100%;background:black;}</style>" +
      "<iframe src='https://eaglercraft.dev/clients/Tuff%20Client%20Beta%201.1UT12%20WASM/' style='width:100%;height:100%;border:none;'></iframe>"
    );

    newWindow.document.close();
  }

  window.checkPassword = function() {
    const input = document.getElementById("passwordInput").value.trim().toLowerCase();
    const remember = document.getElementById("rememberPass").checked;

    // 💾 SAVE PASSWORD
    if (remember) {
      localStorage.setItem("savedPassword", input);
    } else {
      localStorage.removeItem("savedPassword");
    }

    if (["carrotdev","carrotdevtools","carrotdevtool"].includes(input)) {
      openDevPanel();
      return;
    }

    if (!siteEnabled) {
      playJumpScare();
      return;
    }

    if (input === "kylerisrooegg") {
      openCloakedWindow();
      document.getElementById("modal").style.display = "none";
      return;
    }

    playJumpScare();
  };

  function playJumpScare() {
    const scare = document.createElement("div");
    scare.innerText = "🥕";
    scare.style.position = "fixed";
    scare.style.top = "50%";
    scare.style.left = "50%";
    scare.style.transform = "translate(-50%,-50%) scale(5)";
    scare.style.fontSize = "100px";
    scare.style.zIndex = 9999;

    document.body.appendChild(scare);

    setTimeout(() => scare.remove(), 800);
  }

};
</script>

</body>
</html>
