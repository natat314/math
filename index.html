<!DOCTYPE html>
<html>
<head>
  <title>Antiegg</title>
  <!-- 32x32 egg favicon embedded in base64 -->
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAABHUlEQVRYR+2XwQ2AIAxD3f2/0+zNmxMGuJj5p+eU6v7rIZB4HZDm0z4RJBklQAUhQBFIBb4A0EAo9Y5CZz9wAUpSADWDHfN5gUSgAV1+zCz6A5A9zBco1K+cU4DUAZfJdM0vFDNqdHLgS+gS5G9DaH+gCbg3fPjK6DwB7aXZ/S1gBtwEykFSN9vAJYGbwAKi5l0pJgHj7M6V4nI+6uOAD5AWOkFur7gFJQ+SDvYZR5wA0gMoB0bZ+hx0AXkBZgR0Nzy/tgFDwGkD8ICyASQDSdCHXeoVUgAAAABJRU5ErkJggg==">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    h1 { margin-bottom: 20px; font-weight: 500; }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    button:hover { background: #2563eb; transform: scale(1.05); }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
      animation: fadeIn 0.3s ease;
    }

    .modal-box img {
      width: 80px;
      margin-bottom: 15px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .error { color: #f87171; margin-top: 10px; display: none; font-size: 14px; }

    @keyframes fadeIn { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
  </style>
</head>
<body>

<div class="container">
  <h1>Secure Access</h1>
  <button onclick="showModal()">Open</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Antiegg</h3>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Egg_icon.png/80px-Egg_icon.png" alt="Egg">
    <input type="password" id="passwordInput" placeholder="Password...">
    <br><br>
    <button onclick="checkPassword()">Continue</button>
    <div class="error" id="errorMsg">Wrong password</div>
  </div>
</div>

<script>
  function getTodayPassword() {
    const days = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
    return "kylerisegg" + days[new Date().getDay()];
  }

  function showModal() { document.getElementById("modal").style.display = "flex"; }

  function checkPassword() {
    const input = document.getElementById("passwordInput").value.toLowerCase();
    const correct = getTodayPassword();
    if(input !== correct) { document.getElementById("errorMsg").style.display="block"; return; }
    document.getElementById("modal").style.display="none"; openCloaked();
  }

  function openCloaked() {
    const newWin = window.open("about:blank","_blank","width=1000,height=700,menubar=no,toolbar=no,location=no,status=no");
    if(!newWin){ alert("Allow popups for this site."); return; }
    newWin.document.write(`
      <!DOCTYPE html>
      <html>
        <head>
          <title>Loading...</title>
          <style>
            html, body { margin:0; padding:0; height:100%; background:black; display:flex; align-items:center; justify-content:center; color:white; font-family:Arial; }
            .loader { text-align:center; }
            iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; display:none; }
          </style>
        </head>
        <body>
          <div class="loader">Loading...</div>
          <iframe id="frame" src="https://eaglercraft.dev/clients/Tuff%20Client%20Beta%201.1UT12%20WASM/"></iframe>
          <script>
            const frame = document.getElementById("frame");
            frame.onload = ()=>{ document.querySelector(".loader").style.display="none"; frame.style.display="block"; };
          <\/script>
        </body>
      </html>
    `);
    newWin.document.close();
  }
</script>

</body>
</html>
