<!DOCTYPE html>
<html>
<head>
  <title>The Carrot Launcher</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAABHUlEQVRYR+2XwQ2AIAxD3f2/0+zNmxMGuJj5p+eU6v7rIZB4HZDm0z4RJBklQAUhQBFIBb4A0EAo9Y5CZz9wAUpSADWDHfN5gUSgAV1+zCz6A5A9zBco1K+cU4DUAZfJdM0vFDNqdHLgS+gS5G9DaH+gCbg3fPjK6DwB7aXZ/S1gBtwEykFSN9vAJYGbwAKi5l0pJgHj7M6V4nI+6uOAD5AWOkFur7gFJQ+SDvYZR5wA0gMoB0bZ+hx0AXkBZgR0Nzy/tgFDwGkD8ICyASQDSdCHXeoVUgAAAABJRU5ErkJggg==">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FF9F45, #FF6F31);
      font-family: Arial, sans-serif;
      color: #fff7e6;
      overflow: hidden;
      cursor: none; /* Hide default cursor */
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      background: rgba(255, 159, 69, 0.15);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(255, 111, 49, 0.4);
      backdrop-filter: blur(10px);
    }

    h1 { margin-bottom: 20px; font-weight: 500; }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #FF6F31;
      color: #fff7e6;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    button:hover { background: #FF7F3F; transform: scale(1.05); }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }

    .modal-box {
      background: #FF9F45;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
      animation: fadeIn 0.3s ease;
      color: #fff7e6;
    }

    .modal-box img {
      width: 80px;
      margin-bottom: 15px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .error { color: #ff4d4d; margin-top: 10px; display: none; font-size: 14px; }

    @keyframes fadeIn { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }

    /* Carrot animation canvas */
    #carrotCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* Carrot cursor */
    #carrotCursor {
      position: fixed;
      width: 40px;
      height: 40px;
      z-index: 9999;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

  </style>
</head>
<body>

<canvas id="carrotCanvas"></canvas>
<img id="carrotCursor" src="https://upload.wikimedia.org/wikipedia/commons/7/70/Carrot_icon.png" alt="Carrot Cursor">

<div class="container">
  <h1>The Carrot Launcher</h1>
  <button onclick="showModal()">Open</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>The Carrot Launcher</h3>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Egg_icon.png/80px-Egg_icon.png" alt="Egg">
    <input type="password" id="passwordInput" placeholder="Password...">
    <br><br>
    <button onclick="checkPassword()">Continue</button>
    <div class="error" id="errorMsg">Wrong password</div>
  </div>
</div>

<script>
  // Password logic
  function getTodayPassword() {
    const days = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
    return "kylerisegg" + days[new Date().getDay()];
  }

  function showModal() { document.getElementById("modal").style.display = "flex"; }

  function checkPassword() {
    const input = document.getElementById("passwordInput").value.toLowerCase();
    const correct = getTodayPassword();
    if(input !== correct) { document.getElementById("errorMsg").style.display="block"; return; }
    document.getElementById("modal").style.display="none"; openCloaked();
  }

  function openCloaked() {
    const newWin = window.open("about:blank","_blank","width=1000,height=700,menubar=no,toolbar=no,location=no,status=no");
    if(!newWin){ alert("Allow popups for this site."); return; }
    newWin.document.write(`
      <!DOCTYPE html>
      <html>
        <head>
          <title>Loading...</title>
          <style>
            html, body { margin:0; padding:0; height:100%; background:#FF6F31; display:flex; align-items:center; justify-content:center; color:#fff7e6; font-family:Arial; }
            .loader { text-align:center; }
            iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; display:none; }
          </style>
        </head>
        <body>
          <div class="loader">Loading...</div>
          <iframe id="frame" src="https://eaglercraft.dev/clients/Tuff%20Client%20Beta%201.1UT12%20WASM/"></iframe>
          <script>
            const frame = document.getElementById("frame");
            frame.onload = ()=>{ document.querySelector(".loader").style.display="none"; frame.style.display="block"; };
          <\/script>
        </body>
      </html>
    `);
    newWin.document.close();
  }

  // Carrot bouncing animation
  const canvas = document.getElementById("carrotCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  class Carrot {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.vx = (Math.random() * 4 + 2) * (Math.random() < 0.5 ? 1 : -1);
      this.vy = (Math.random() * 4 + 2) * (Math.random() < 0.5 ? 1 : -1);
      this.size = 40;
      this.color = `hsl(${Math.random()*30+30}, 100%, 50%)`; // carrot orange variations
    }

    draw() {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + this.size/2, this.y + this.size);
      ctx.lineTo(this.x - this.size/2, this.y + this.size);
      ctx.closePath();
      ctx.fill();
      // green top
      ctx.fillStyle = 'green';
      ctx.fillRect(this.x - this.size/8, this.y - this.size/2, this.size/4, this.size/2);
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;

      let bounced = false;
      if (this.x + this.size/2 >= canvas.width || this.x - this.size/2 <= 0) {
        this.vx *= -1; bounced = true;
      }
      if (this.y + this.size >= canvas.height || this.y - this.size/2 <= 0) {
        this.vy *= -1; bounced = true;
      }
      if (bounced) {
        this.color = `hsl(${Math.random()*30+30}, 100%, 50%)`; // change color on bounce
      }

      this.draw();
    }
  }

  const carrots = [];
  for (let i=0; i<5; i++) carrots.push(new Carrot());

  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    carrots.forEach(c => c.update());
    requestAnimationFrame(animate);
  }

  animate();

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  // Carrot cursor
  const carrotCursor = document.getElementById('carrotCursor');
  document.addEventListener('mousemove', e => {
    carrotCursor.style.left = e.clientX + 'px';
    carrotCursor.style.top = e.clientY + 'px';
  });
</script>

</body>
</html>
