<script>
function playJumpScare() {
  const scare = document.createElement('img');

  // 🥕 Evil carrot image
  scare.src = 'https://i.imgur.com/8Qf6K3R.png'; // evil carrot (works better than old link)

  scare.style.position = 'fixed';
  scare.style.top = '50%';
  scare.style.left = '50%';
  scare.style.transform = 'translate(-50%, -50%) scale(0.1)';
  scare.style.width = '300px';
  scare.style.height = '300px';
  scare.style.objectFit = 'contain';
  scare.style.zIndex = 10000;
  scare.style.transition = 'transform 0.2s ease-out';
  document.body.appendChild(scare);

  // 💥 pop-in animation
  setTimeout(() => {
    scare.style.transform = 'translate(-50%, -50%) scale(1.3)';
  }, 10);

  // 🔊 GET OUT sound
  const audio = new Audio('https://www.myinstants.com/media/sounds/get-out-sound-effect.mp3');
  audio.volume = 1;
  audio.play();

  setTimeout(() => {
    scare.remove();
  }, 1500);
}
</script>
