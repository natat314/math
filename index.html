<!DOCTYPE html>
<html>
<head>
  <title>Popup Window</title>
</head>
<body>

<button id="myBtn" style="background-color:#f8f8f8; padding:15px 25px; border:none; cursor:pointer;">
  Open Window
</button>

<script>
  function getRandomColor() {
    let letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
      color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
  }

  document.getElementById("myBtn").onclick = function() {
    // Open a popup window (not tab)
    let win = window.open('', '', 'width=800,height=600');

    // Write an about:blank page with iframe
    win.document.write(`
      <!DOCTYPE html>
      <html>
      <head><title>About Blank</title></head>
      <body style="margin:0">
        <iframe src="https://biologistice.github.io/tuff/" 
                style="border:none; width:100%; height:100%;">
        </iframe>
      </body>
      </html>
    `);

    win.document.close();

    // Change button color
    this.style.backgroundColor = getRandomColor();
  };
</script>

</body>
</html>
