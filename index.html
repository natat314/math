<script>
  const cursorCanvas = document.getElementById('carrotCursor');
  const ctx = cursorCanvas.getContext('2d');

  function resizeCanvas() {
    cursorCanvas.width = window.innerWidth;
    cursorCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function drawCarrot() {
    ctx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
    ctx.save();

    const bounce = Math.sin(Date.now() / 150) * 5;
    ctx.translate(mouseX, mouseY - bounce);

    ctx.fillStyle = '#FF9F45';
    ctx.beginPath();
    ctx.moveTo(0, -15);
    ctx.lineTo(10, 15);
    ctx.lineTo(-10, 15);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'green';
    ctx.fillRect(-3, -25, 6, 10);

    ctx.restore();
    requestAnimationFrame(drawCarrot);
  }
  drawCarrot();

  function showModal() {
    document.getElementById("modal").style.display = "flex";
  }

  // ✅ PASSWORD (clean + reliable)
  function getTodayPassword() {
    return "kylerwillneverfindthepassword";
  }

  function checkPassword() {
    const input = document.getElementById("passwordInput").value
      .trim()          // removes spaces
      .toLowerCase();  // ignores uppercase/lowercase

    const correct = getTodayPassword();

    console.log("INPUT:", input);
    console.log("CORRECT:", correct);

    if (input !== correct) {
      playJumpScare();
      return;
    }

    alert("Access granted ✅");
    document.getElementById("modal").style.display = "none";
  }

  function playJumpScare() {
    const scare = document.createElement('img');
    scare.src = 'https://upload.wikimedia.org/wikipedia/commons/7/7e/Carrot.png';

    scare.style.position = 'fixed';
    scare.style.top = '50%';
    scare.style.left = '50%';
    scare.style.transform = 'translate(-50%, -50%) scale(0.1)';
    scare.style.width = '250px';
    scare.style.zIndex = 10000;
    scare.style.transition = 'transform 0.15s ease-out';
    document.body.appendChild(scare);

    setTimeout(() => {
      scare.style.transform = 'translate(-50%, -50%) scale(1.5)';
    }, 10);

    new Audio('https://www.myinstants.com/media/sounds/get-out-sound-effect.mp3').play();

    const flash = document.getElementById('flash');
    flash.style.opacity = '0.8';
    setTimeout(() => flash.style.opacity = '0', 150);

    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 300);

    // ⚠️ pointer lock can fail silently, so wrap it
    if (document.body.requestPointerLock) {
      document.body.requestPointerLock();
    }

    setTimeout(() => {
      scare.remove();
    }, 1200);
  }
</script>
