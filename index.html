<script>
function playJumpScare() {
  const scare = document.createElement('img');

  // Image (you can change this if you want)
  scare.src = 'https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg';

  scare.style.position = 'fixed';
  scare.style.top = '0';
  scare.style.left = '0';
  scare.style.width = '100vw';
  scare.style.height = '100vh';
  scare.style.objectFit = 'cover';
  scare.style.zIndex = 10000;
  document.body.appendChild(scare);

  // 🔊 GET OUT meme sound
  const audio = new Audio('https://www.myinstants.com/media/sounds/get-out-sound-effect.mp3');
  audio.volume = 1;
  audio.play();

  setTimeout(() => {
    scare.remove();
  }, 1500);
}
</script>
