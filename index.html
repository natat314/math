<!DOCTYPE html>
<html>
<head>
  <title>The Carrot Launcher</title>

  <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;

      background: url("https://i.postimg.cc/zG5b04QZ/High-five-of-both-avatars.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      filter: brightness(1.25) contrast(1.1);
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
      pointer-events: none;
    }

    body::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: orange;
      filter: blur(180px);
      opacity: 0.2;
      top: -100px;
      left: -100px;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      text-align: center;
      padding: 30px 40px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      position: relative;
      z-index: 2;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, orange, #ff6a00);
      color: white;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .modal-box {
      background: rgba(20,20,20,0.95);
      padding: 25px;
      border-radius: 16px;
      width: 280px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
      margin-bottom: 10px;
      outline: none;
    }

    label {
      font-size: 12px;
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 8px 0;
      opacity: 0.8;
    }

    .splash {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #ffeb3b;
      text-shadow: 2px 2px 0 #000;
      pointer-events: none;
      font-family: "Minecraftia", monospace;
      animation: splashBounce 1.2s infinite ease-in-out;
    }

    @keyframes splashBounce {
      0% { transform: rotate(-10deg) scale(1); }
      50% { transform: rotate(-6deg) scale(1.15); }
      100% { transform: rotate(-10deg) scale(1); }
    }
  </style>
</head>

/* ================= TERMINAL ================= */
function openTerminal() {
  const win = window.open("", "_blank", "width=600,height=500");

  win.document.write(`
    <style>
      body { margin:0; background:black; color:#0f0; font-family:monospace; padding:10px; }
      input { width:100%; background:black; color:#0f0; border:none; outline:none; }
    </style>

    <div id="log">CarrotOS Terminal\nhelp</div>
    <input id="cmd" autofocus>

    <script>
      const log = document.getElementById("log");
      const cmd = document.getElementById("cmd");

      function write(t){ log.innerText += "\\n" + t; }

      cmd.addEventListener("keydown", e=>{
        if(e.key === "Enter"){
          const c = cmd.value.toLowerCase().trim();
          write("> " + c);

          if(c === "help") write("enable / disable / status / clear");
          else if(c === "status") write(localStorage.getItem("siteEnabled") === "true" ? "🟢 ENABLED" : "🔴 DISABLED");
          else if(c === "disable"){ localStorage.setItem("siteEnabled","false"); write("DISABLED"); }
          else if(c === "enable"){ localStorage.setItem("siteEnabled","true"); write("ENABLED"); }
          else if(c === "clear") log.innerText = "CarrotOS Terminal";

          cmd.value = "";
        }
      });
    <\/script>
  `);
}

}

/* ================= MOUSE DOT SYSTEM ================= */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

window.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

const dots = Array.from({ length: 120 }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  vx: (Math.random() - 0.5) * 1.6,
  vy: (Math.random() - 0.5) * 1.6
}));

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "orange";
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 6, 0, Math.PI * 2);
  ctx.fill();

  for (let i = 0; i < dots.length; i++) {
    let p = dots[i];

    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
    ctx.fill();

    let d = Math.hypot(p.x - mouse.x, p.y - mouse.y);
    if (d < 220) {
      ctx.strokeStyle = "rgba(255,165,0,0.35)";
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(mouse.x, mouse.y);
      ctx.stroke();
    }
  }

  requestAnimationFrame(animate);
}

animate();
