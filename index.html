<!DOCTYPE html>
<html>
  <head>
    <title>clicktochangecolor</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #111;
        font-family: Arial, sans-serif;
      }
      button {
        padding: 20px 40px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        background-color: red;
        color: white;
        cursor: pointer;
        transition: background-color 0.3s;
      }
    </style>
  </head>
  <body>
    <button id="btn" onclick="openSite()">Click to change color</button>

    <script>
      const colors = ["red", "blue", "green", "purple", "orange", "pink"];
      let i = 0;

      function openSite() {
        // Change button color
        const btn = document.getElementById("btn");
        i = (i + 1) % colors.length;
        btn.style.backgroundColor = colors[i];

        // Open the actual website in a new tab
        window.open("https://eaglercraft.dev/clients/Tuff%20Client%20WASM/", "_blank");
      }
    </script>
  </body>
</html>
